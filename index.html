<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Viral Notely — Content Review</title>
<style>
  :root {
    --bg: #0f1117;
    --bg2: #181c27;
    --bg3: #1f2436;
    --card: #1a1f30;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0f2f8;
    --muted: #8b92a8;
    --hint: #555e78;
    --accent: #6c63ff;
    --accent2: #a78bfa;
    --green: #22c55e;
    --green-bg: rgba(34,197,94,0.12);
    --amber: #f59e0b;
    --amber-bg: rgba(245,158,11,0.12);
    --red: #ef4444;
    --red-bg: rgba(239,68,68,0.1);
    --blue: #3b82f6;
    --blue-bg: rgba(59,130,246,0.12);
    --radius: 10px;
    --radius-lg: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; font-size: 14px; line-height: 1.6; min-height: 100vh; }

  /* ── TOP NAV ── */
  .topnav { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .logo { font-size: 15px; font-weight: 700; letter-spacing: -.3px; color: var(--text); display: flex; align-items: center; gap: 8px; }
  .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); display: inline-block; }
  .nav-right { display: flex; align-items: center; gap: 12px; }
  .stat-pill { background: var(--bg3); border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px; font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
  .stat-pill strong { color: var(--amber); font-weight: 600; }

  /* ── LAYOUT ── */
  .shell { max-width: 860px; margin: 0 auto; padding: 24px 16px 80px; }

  /* ── CONNECTION PANEL ── */
  .conn-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 24px; margin-bottom: 24px; }
  .conn-title { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 16px; }
  .conn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
  @media(max-width:540px){ .conn-grid { grid-template-columns: 1fr; } }
  .field-group label { display: block; font-size: 11px; font-weight: 600; color: var(--hint); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
  input[type=text], input[type=password], input[type=url], textarea, select {
    width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-size: 13px; font-family: inherit; padding: 9px 12px; outline: none; transition: border-color .15s;
  }
  input:focus, textarea:focus { border-color: var(--accent); }
  textarea { resize: vertical; line-height: 1.6; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 18px; border-radius: var(--radius); font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: opacity .15s, transform .1s; font-family: inherit; }
  .btn:hover { opacity: .88; }
  .btn:active { transform: scale(.97); }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-ghost { background: var(--bg3); border: 1px solid var(--border2); color: var(--text); }
  .btn-green { background: var(--green-bg); border: 1px solid rgba(34,197,94,.3); color: var(--green); }
  .btn-amber { background: var(--amber-bg); border: 1px solid rgba(245,158,11,.3); color: var(--amber); }
  .conn-status { font-size: 12px; color: var(--muted); margin-top: 10px; min-height: 18px; }
  .conn-status.ok { color: var(--green); }
  .conn-status.err { color: var(--red); }

  /* ── NAV BAR ── */
  .nav-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
  .nav-arrows { display: flex; align-items: center; gap: 8px; }
  .arrow-btn { width: 36px; height: 36px; border-radius: var(--radius); background: var(--bg3); border: 1px solid var(--border2); color: var(--text); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background .15s; }
  .arrow-btn:hover:not(:disabled) { background: var(--bg2); border-color: var(--accent); color: var(--accent); }
  .arrow-btn:disabled { opacity: .3; cursor: not-allowed; }
  .nav-counter { font-size: 13px; color: var(--muted); min-width: 60px; text-align: center; }
  .badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; }
  .badge-orange { background: var(--amber-bg); color: var(--amber); border: 1px solid rgba(245,158,11,.25); }
  .badge-green { background: var(--green-bg); color: var(--green); border: 1px solid rgba(34,197,94,.25); }
  .badge-gray { background: var(--bg3); color: var(--hint); border: 1px solid var(--border); }
  .badge-blue { background: var(--blue-bg); color: var(--blue); border: 1px solid rgba(59,130,246,.25); }

  /* ── SECTION CARDS ── */
  .section-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; margin-bottom: 14px; }
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .section-label { font-size: 11px; font-weight: 700; color: var(--hint); text-transform: uppercase; letter-spacing: .07em; display: flex; align-items: center; gap: 6px; }
  .section-label svg { opacity: .6; }

  /* ── EDITABLE FIELDS ── */
  .editable-field { margin-bottom: 18px; }
  .editable-field:last-child { margin-bottom: 0; }
  .field-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; }
  .field-label { font-size: 11px; font-weight: 600; color: var(--hint); text-transform: uppercase; letter-spacing: .06em; }
  .edit-btn { background: none; border: 1px solid transparent; border-radius: 6px; color: var(--hint); font-size: 11px; font-weight: 500; cursor: pointer; padding: 2px 8px; display: flex; align-items: center; gap: 4px; font-family: inherit; transition: all .15s; }
  .edit-btn:hover { border-color: var(--border2); color: var(--accent2); background: var(--bg3); }
  .field-display { color: var(--text); font-size: 14px; line-height: 1.65; }
  .field-display.headline { font-size: 16px; font-weight: 600; color: var(--text); line-height: 1.4; }
  .field-display.dek { color: var(--muted); font-style: italic; }
  .field-display.body-text { position: relative; }
  .body-inner { overflow: hidden; transition: max-height .3s ease; }
  .body-inner.collapsed { max-height: 110px; }
  .body-fade { position: absolute; bottom: 0; left: 0; right: 0; height: 40px; background: linear-gradient(transparent, var(--card)); pointer-events: none; }
  .body-toggle { background: none; border: none; color: var(--accent2); font-size: 12px; cursor: pointer; padding: 4px 0; font-family: inherit; margin-top: 4px; }
  .edit-zone { margin-top: 6px; }
  .edit-actions { display: flex; gap: 6px; margin-top: 8px; }
  .save-field-btn { padding: 5px 14px; font-size: 12px; }

  /* ── DIVIDER ── */
  .divider { height: 1px; background: var(--border); margin: 16px 0; }

  /* ── IMAGES ── */
  .img-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; margin: 12px 0; }
  @media(max-width:400px){ .img-grid { grid-template-columns: repeat(auto-fill, minmax(90px,1fr)); } }
  .img-thumb { aspect-ratio: 16/9; border-radius: var(--radius); overflow: hidden; cursor: pointer; border: 2px solid transparent; position: relative; background: var(--bg3); transition: border-color .15s, transform .1s; }
  .img-thumb:hover { border-color: var(--accent2); transform: scale(1.02); }
  .img-thumb.selected { border-color: var(--accent); }
  .img-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .img-thumb .tick { display: none; position: absolute; top: 5px; right: 5px; background: var(--accent); color: #fff; border-radius: 50%; width: 20px; height: 20px; align-items: center; justify-content: center; font-size: 11px; }
  .img-thumb.selected .tick { display: flex; }
  .img-broken { position: absolute; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; gap: 4px; font-size: 10px; color: var(--hint); }
  .thumb-url-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-top: 10px; }
  .thumb-url-row input { flex: 1; min-width: 160px; }
  .thumb-preview { width: 100%; max-height: 160px; object-fit: cover; border-radius: var(--radius); margin-top: 10px; border: 1px solid var(--border); display: none; }

  /* ── ACTION BAR ── */
  .action-bar { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 6px; }
  @media(max-width:480px){ .action-bar .btn { flex: 1; justify-content: center; } }

  /* ── TOAST ── */
  #toast { position: fixed; bottom: 20px; right: 20px; background: var(--bg2); border: 1px solid var(--border2); border-radius: var(--radius-lg); padding: 10px 18px; font-size: 13px; color: var(--text); z-index: 999; display: none; max-width: 280px; box-shadow: 0 4px 24px rgba(0,0,0,.4); }
  #toast.ok { border-color: rgba(34,197,94,.4); }
  #toast.warn { border-color: rgba(245,158,11,.4); }
  #toast.err { border-color: rgba(239,68,68,.4); }

  /* ── EMPTY / ALL DONE ── */
  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-state h2 { font-size: 18px; color: var(--text); margin-bottom: 8px; }

  /* ── ICON SVGs (inline micro) ── */
  .ico { width: 14px; height: 14px; display: inline-block; vertical-align: -2px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
</style>
</head>
<body>

<!-- TOP NAV -->
<nav class="topnav">
  <div class="logo">
    <span class="logo-dot"></span>
    Viral Notely <span style="color:var(--hint);font-weight:400;margin-left:4px;">Review</span>
  </div>
  <div class="nav-right">
    <button onclick="clearCreds()" style="font-size:12px;padding:5px 12px;background:var(--bg3);border:1px solid var(--border2);color:var(--muted);border-radius:var(--radius);cursor:pointer;">&#9881; Reset</button>
    <div class="stat-pill" id="nav-count" style="display:none;">
      <strong id="nav-total">0</strong> unprocessed
    </div>
  </div>
</nav>

<div class="shell">

  <!-- CONNECTION PANEL -->
  <div class="conn-card" id="conn-panel">
    <div class="conn-title">Connect to Supabase</div>
    <div class="conn-grid">
      <div class="field-group">
        <label>Project URL</label>
        <input type="text" id="sb-url" placeholder="https://xxxx.supabase.co" />
      </div>
      <div class="field-group">
        <label>Anon / Service key</label>
        <input type="password" id="sb-key" placeholder="eyJ..." />
      </div>
    </div>
    <button class="btn btn-primary" onclick="connectAndLoad()">
      <svg class="ico"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      Connect &amp; load
    </button>
    <div class="conn-status" id="conn-status">Enter your credentials above to begin.</div>
  </div>

  <!-- MAIN DASHBOARD (hidden until connected) -->
  <div id="dash" style="display:none;">

    <!-- NAV BAR -->
    <div class="nav-bar">
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
        <span class="badge badge-orange">&#9679; Unprocessed</span>
        <span style="font-size:13px;color:var(--muted);" id="item-label">—</span>
      </div>
      <div class="nav-arrows">
        <button class="arrow-btn" id="prev-btn" onclick="navigate(-1)" disabled title="Previous">&#8592;</button>
        <span class="nav-counter" id="nav-counter">— / —</span>
        <button class="arrow-btn" id="next-btn" onclick="navigate(1)" disabled title="Next">&#8594;</button>
      </div>
    </div>

    <!-- EVENT DETAIL -->
    <div id="event-detail"></div>

  </div>
</div>

<div id="toast"></div>

<script>
let events = [], idx = 0, sbUrl = '', sbKey = '', totalCount = 0;

/* ── SUPABASE HELPERS ── */
async function sb(path, opts = {}) {
  const res = await fetch(sbUrl + path, {
    headers: {
      apikey: sbKey,
      Authorization: 'Bearer ' + sbKey,
      'Content-Type': 'application/json',
      ...(opts.headers || {})
    },
    ...opts
  });
  if (!res.ok) {
    const txt = await res.text();
    throw new Error(res.status + ' ' + txt);
  }
  return opts.raw ? res : res.json();
}

async function patch(id, payload) {
  await sb(`/rest/v1/events?id=eq.${id}`, {
    method: 'PATCH',
    headers: { Prefer: 'return=minimal' },
    body: JSON.stringify(payload)
  });
}

/* ── AUTO-LOAD SAVED CREDENTIALS ── */
window.addEventListener('DOMContentLoaded', () => {
  const savedUrl = localStorage.getItem('vn_sb_url');
  const savedKey = localStorage.getItem('vn_sb_key');
  if (savedUrl) document.getElementById('sb-url').value = savedUrl;
  if (savedKey) document.getElementById('sb-key').value = savedKey;
  if (savedUrl && savedKey) {
    setStatus('Saved credentials found — connecting…');
    setTimeout(connectAndLoad, 300);
  }
});

/* ── CONNECT ── */
async function connectAndLoad() {
  sbUrl = document.getElementById('sb-url').value.trim().replace(/\/$/, '');
  sbKey = document.getElementById('sb-key').value.trim();
  if (!sbUrl || !sbKey) { toast('Enter URL and key first', 'warn'); return; }
  setStatus('Connecting…');
  try {
    const res = await sb(
      `/rest/v1/events?select=id,snapshot_summary,social_headline,article,usablethumbnails,thumbnail,status&status=eq.unprocessed&order=id.desc&limit=200`,
      { headers: { Prefer: 'count=exact' }, raw: true }
    );
    const range = res.headers.get('content-range');
    totalCount = range ? parseInt(range.split('/')[1]) : 0;
    events = await res.json();
    if (!events.length) { setStatus('No unprocessed events found.'); return; }
    localStorage.setItem('vn_sb_url', sbUrl);
    localStorage.setItem('vn_sb_key', sbKey);
    document.getElementById('nav-count').style.display = 'flex';
    document.getElementById('nav-total').textContent = totalCount;
    document.getElementById('dash').style.display = 'block';
    idx = 0;
    setStatus('Connected — ' + events.length + ' events loaded', 'ok');
    renderEvent();
  } catch (e) {
    setStatus('Error: ' + e.message, 'err');
  }
}

/* ── CLEAR SAVED CREDENTIALS ── */
function clearCreds() {
  localStorage.removeItem('vn_sb_url');
  localStorage.removeItem('vn_sb_key');
  document.getElementById('sb-url').value = '';
  document.getElementById('sb-key').value = '';
  setStatus('Credentials cleared.');
}

/* ── PARSE HELPERS ── */
function getImgs(row) {
  const raw = row.usablethumbnails;
  if (!raw) return [];
  if (Array.isArray(raw)) return raw.filter(Boolean);
  if (raw.items && Array.isArray(raw.items)) return raw.items.filter(Boolean);
  if (typeof raw === 'object') return Object.values(raw).filter(v => typeof v === 'string');
  try { const p = JSON.parse(raw); return Array.isArray(p) ? p : (p.items || Object.values(p)); } catch { return []; }
}

function getArt(row) {
  const a = row.article;
  if (!a) return { title: '', dek: '', body: '' };
  if (typeof a === 'string') { try { return JSON.parse(a); } catch { return { body: a }; } }
  return a;
}

/* ── RENDER ── */
function renderEvent() {
  const row = events[idx];
  if (!row) return;
  const art = getArt(row);
  const imgs = getImgs(row);

  document.getElementById('nav-counter').textContent = (idx + 1) + ' / ' + events.length;
  document.getElementById('prev-btn').disabled = idx === 0;
  document.getElementById('next-btn').disabled = idx === events.length - 1;
  document.getElementById('item-label').textContent = 'ID ' + row.id;

  const hasThumbnail = !!row.thumbnail;

  document.getElementById('event-detail').innerHTML = `

  <!-- HEADLINE + SOCIAL -->
  <div class="section-card">
    <div class="section-header">
      <div class="section-label">
        <svg class="ico"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
        Quick info
      </div>
      <span class="badge ${hasThumbnail ? 'badge-green' : 'badge-gray'}">${hasThumbnail ? '&#10003; Thumbnail set' : 'No thumbnail'}</span>
    </div>

    ${editableField('social_headline', 'Social headline', row.social_headline || '', 'headline', 'input')}
    <div class="divider"></div>
    ${editableField('snapshot_summary', 'Snapshot summary', row.snapshot_summary || '', '', 'textarea')}
  </div>

  <!-- ARTICLE -->
  <div class="section-card">
    <div class="section-header">
      <div class="section-label">
        <svg class="ico"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Article
      </div>
    </div>

    ${editableField('art_title', 'Title', art.title || '', 'headline', 'input')}
    <div class="divider"></div>
    ${editableField('art_dek', 'Dek', art.dek || '', 'dek', 'textarea')}
    <div class="divider"></div>
    <div class="editable-field">
      <div class="field-top">
        <span class="field-label">Body</span>
        <button class="edit-btn" onclick="toggleEdit('art_body', ${JSON.stringify(art.body || '')})">&#9998; Edit</button>
      </div>
      <div id="view-art_body" class="field-display body-text">
        <div class="body-inner collapsed" id="body-inner">${esc(art.body || '—')}</div>
        <div class="body-fade" id="body-fade"></div>
        <button class="body-toggle" id="body-toggle-btn" onclick="toggleBody()">&#9660; Show more</button>
      </div>
      <div id="edit-art_body" class="edit-zone" style="display:none;">
        <textarea id="input-art_body" rows="12">${esc(art.body || '')}</textarea>
        <div class="edit-actions">
          <button class="btn btn-primary save-field-btn" onclick="saveArticleField('body', 'art_body')">Save body</button>
          <button class="btn btn-ghost save-field-btn" onclick="cancelEdit('art_body')">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <!-- IMAGES -->
  <div class="section-card">
    <div class="section-header">
      <div class="section-label">
        <svg class="ico"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        Featured image
      </div>
    </div>

    ${imgs.length ? `
    <p style="font-size:12px;color:var(--muted);margin-bottom:4px;">Click any image to select it as the thumbnail</p>
    <div class="img-grid">
      ${imgs.map((url, i) => `
        <div class="img-thumb ${url === row.thumbnail ? 'selected' : ''}" id="imgthumb-${i}" onclick="selectThumb('${escAttr(url)}', ${i})">
          <img src="${escAttr(url)}" loading="lazy"
            onerror="this.style.display='none';this.parentElement.querySelector('.img-broken').style.display='flex';" />
          <div class="img-broken">
            <svg style="width:20px;height:20px;stroke:var(--hint);fill:none;stroke-width:2;" viewBox="0 0 24 24"><line x1="1" y1="1" x2="23" y2="23"/><path d="M21 21H3a2 2 0 0 1-2-2V8"/><path d="M4 4l16 0v9"/></svg>
            <span>Failed</span>
          </div>
          <div class="tick">&#10003;</div>
        </div>
      `).join('')}
    </div>
    ` : `<p style="font-size:13px;color:var(--hint);margin-bottom:8px;">No images available in usablethumbnails.</p>`}

    <div class="thumb-url-row">
      <input type="url" id="thumb-input" placeholder="Or paste image URL directly…" value="${escAttr(row.thumbnail || '')}" oninput="onThumbInput()" />
      <button class="btn btn-primary" onclick="saveThumb()" style="white-space:nowrap;">Save thumbnail</button>
    </div>
    ${row.thumbnail ? `<img src="${escAttr(row.thumbnail)}" id="thumb-preview" class="thumb-preview" style="display:block;" onerror="this.style.display='none'" />` : `<img id="thumb-preview" class="thumb-preview" />`}
  </div>

  <!-- ACTIONS -->
  <div class="section-card" style="padding:16px 20px;">
    <p style="font-size:12px;color:var(--hint);margin-bottom:12px;">Update status for this event</p>
    <div class="action-bar">
      <button class="btn btn-green" onclick="updateStatus('reviewed')">
        <svg class="ico"><polyline points="20 6 9 17 4 12"/></svg>
        Mark as reviewed
      </button>
      <button class="btn btn-amber" onclick="updateStatus('paused')">
        <svg class="ico"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
        Pause
      </button>
    </div>
  </div>
  `;

  // init body toggle
  window._bodyExpanded = false;
}

/* ── FIELD BUILDER ── */
function editableField(key, label, value, cls, inputType) {
  const displayCls = 'field-display ' + (cls || '');
  const inputEl = inputType === 'textarea'
    ? `<textarea id="input-${key}" rows="3">${esc(value)}</textarea>`
    : `<input type="text" id="input-${key}" value="${escAttr(value)}" />`;
  return `
    <div class="editable-field">
      <div class="field-top">
        <span class="field-label">${label}</span>
        <button class="edit-btn" onclick="toggleEdit('${key}', ${JSON.stringify(value)})">&#9998; Edit</button>
      </div>
      <div id="view-${key}" class="${displayCls}">${cls === 'headline' ? '<strong>' + esc(value || '—') + '</strong>' : esc(value || '—')}</div>
      <div id="edit-${key}" class="edit-zone" style="display:none;">
        ${inputEl}
        <div class="edit-actions">
          <button class="btn btn-primary save-field-btn" onclick="saveField('${key}')">Save</button>
          <button class="btn btn-ghost save-field-btn" onclick="cancelEdit('${key}')">Cancel</button>
        </div>
      </div>
    </div>`;
}

/* ── EDIT CONTROLS ── */
function toggleEdit(key, val) {
  document.getElementById('view-' + key).style.display = 'none';
  const editZone = document.getElementById('edit-' + key);
  editZone.style.display = 'block';
  const inp = document.getElementById('input-' + key);
  if (inp && !inp.value) inp.value = val;
  inp && inp.focus();
}
function cancelEdit(key) {
  document.getElementById('view-' + key).style.display = 'block';
  document.getElementById('edit-' + key).style.display = 'none';
}

/* ── SAVE DIRECT FIELD ── */
async function saveField(key) {
  const val = document.getElementById('input-' + key).value;
  const row = events[idx];
  const dbMap = {
    social_headline: 'social_headline',
    snapshot_summary: 'snapshot_summary'
  };
  try {
    await patch(row.id, { [dbMap[key]]: val });
    row[dbMap[key]] = val;
    const viewEl = document.getElementById('view-' + key);
    viewEl.innerHTML = viewEl.classList.contains('headline') ? '<strong>' + esc(val || '—') + '</strong>' : esc(val || '—');
    cancelEdit(key);
    toast('Saved!', 'ok');
  } catch (e) { toast('Error: ' + e.message, 'err'); }
}

/* ── SAVE ARTICLE SUB-FIELD ── */
async function saveArticleField(sub, key) {
  const val = document.getElementById('input-' + key).value;
  const row = events[idx];
  const art = getArt(row);
  art[sub] = val;
  try {
    await patch(row.id, { article: art });
    row.article = art;
    const viewEl = document.getElementById('view-' + key);
    if (sub === 'body') {
      document.getElementById('body-inner').textContent = val;
    } else {
      viewEl.innerHTML = key === 'art_title' ? '<strong>' + esc(val || '—') + '</strong>' : esc(val || '—');
    }
    cancelEdit(key);
    toast('article.' + sub + ' saved', 'ok');
  } catch (e) { toast('Error: ' + e.message, 'err'); }
}

/* ── BODY TOGGLE ── */
function toggleBody() {
  window._bodyExpanded = !window._bodyExpanded;
  const inner = document.getElementById('body-inner');
  const fade = document.getElementById('body-fade');
  const btn = document.getElementById('body-toggle-btn');
  inner.classList.toggle('collapsed', !window._bodyExpanded);
  if (fade) fade.style.display = window._bodyExpanded ? 'none' : 'block';
  btn.innerHTML = window._bodyExpanded ? '&#9650; Show less' : '&#9660; Show more';
}

/* ── THUMBNAIL ── */
function selectThumb(url, i) {
  document.querySelectorAll('.img-thumb').forEach(el => el.classList.remove('selected'));
  const el = document.getElementById('imgthumb-' + i);
  if (el) el.classList.add('selected');
  document.getElementById('thumb-input').value = url;
  const prev = document.getElementById('thumb-preview');
  if (prev) { prev.src = url; prev.style.display = 'block'; }
}

function onThumbInput() {
  document.querySelectorAll('.img-thumb').forEach(el => el.classList.remove('selected'));
  const val = document.getElementById('thumb-input').value;
  const prev = document.getElementById('thumb-preview');
  if (prev && val) { prev.src = val; prev.style.display = 'block'; }
}

async function saveThumb() {
  const url = document.getElementById('thumb-input').value.trim();
  if (!url) { toast('Enter or select a URL first', 'warn'); return; }
  try {
    await patch(events[idx].id, { thumbnail: url });
    events[idx].thumbnail = url;
    toast('Thumbnail saved', 'ok');
  } catch (e) { toast('Error: ' + e.message, 'err'); }
}

/* ── STATUS UPDATE ── */
async function updateStatus(status) {
  try {
    await patch(events[idx].id, { status });
    toast('Status set to "' + status + '"', 'ok');
    events.splice(idx, 1);
    totalCount = Math.max(0, totalCount - 1);
    document.getElementById('nav-total').textContent = totalCount;
    if (!events.length) {
      document.getElementById('event-detail').innerHTML = `
        <div class="empty-state">
          <h2>All caught up!</h2>
          <p>No more unprocessed events in the queue.</p>
        </div>`;
      document.getElementById('nav-counter').textContent = '0 / 0';
      document.getElementById('prev-btn').disabled = true;
      document.getElementById('next-btn').disabled = true;
      document.getElementById('item-label').textContent = '';
      return;
    }
    idx = Math.min(idx, events.length - 1);
    renderEvent();
  } catch (e) { toast('Error: ' + e.message, 'err'); }
}

/* ── NAVIGATE ── */
function navigate(dir) {
  idx = Math.max(0, Math.min(events.length - 1, idx + dir));
  renderEvent();
}

/* ── TOAST ── */
let _toastTimer;
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = type;
  el.style.display = 'block';
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { el.style.display = 'none'; }, 3000);
}

/* ── UTILS ── */
function setStatus(msg, cls = '') {
  const el = document.getElementById('conn-status');
  el.textContent = msg;
  el.className = 'conn-status ' + cls;
}
function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s) { return String(s || '').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
</script>
